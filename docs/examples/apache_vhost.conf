<VirtualHost *:80>
    ServerName forum.example.com
    DocumentRoot /srv/forum-rewrite/app/public

    <Directory /srv/forum-rewrite/app/public>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    # Prefer explicit env wiring in the vhost so PHP and CLI agree on paths.
    SetEnv FORUM_REPOSITORY_ROOT /srv/forum-rewrite/repository
    SetEnv FORUM_DATABASE_PATH /srv/forum-rewrite/state/cache/post_index.sqlite3
    SetEnv FORUM_PUBLIC_ARTIFACT_ROOT /srv/forum-rewrite/app/public

    ErrorLog ${APACHE_LOG_DIR}/forum-rewrite-error.log
    CustomLog ${APACHE_LOG_DIR}/forum-rewrite-access.log combined
</VirtualHost>

# Notes:
# - enable mod_rewrite
# - ensure the web user can write FORUM_REPOSITORY_ROOT and the parent of FORUM_DATABASE_PATH
# - if sibling static artifacts are enabled, ensure the web user can invalidate public/*.html
# - the checked-in public/.htaccess handles static-first route rewrites
